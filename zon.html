<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atrapa el Corazón ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe6f0, #ffc1e3, #ff9acd);
        }

        /* Caja del juego */

        .container {
            text-align: center;
        }

        #hud {
            width: 450px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #c2185b;
            font-weight: bold;
        }

        .progress-container {
            width: 120px;
            height: 18px;
            background: #ffd6e8;
            border-radius: 20px;
            overflow: hidden;
        }

        #progress {
            width: 0%;
            height: 100%;
            background: #ff4f8b;
            transition: 0.4s;
        }

        #game {
            width: 450px;
            height: 600px;

            background: #fff5fa;

            border: 5px solid #ff69b4;
            border-radius: 25px;

            position: relative;
            overflow: hidden;

            box-shadow: 0 0 30px rgba(255, 105, 180, .4);
        }

        /* Jugador */

        #player {

            position: absolute;

            bottom: 15px;
            left: 190px;

            width: 60px;
            height: 60px;

            font-size: 45px;
        }

        /* Objetos */

        .item {
            position: absolute;
            font-size: 35px;
        }

        /* Pantallas */

        .screen {

            position: absolute;

            width: 100%;
            height: 100%;

            background: rgba(255, 245, 250, .97);

            display: flex;

            flex-direction: column;

            justify-content: center;

            align-items: center;

            padding: 25px;

            z-index: 100;

            text-align: center;
        }

        .screen h1 {

            color: #ff4f8b;

            margin-bottom: 20px;

        }

        .screen p {

            font-size: 18px;

            line-height: 1.8;

            color: #c2185b;

        }

        button {

            margin-top: 25px;

            padding: 12px 25px;

            border: none;

            border-radius: 30px;

            background: #ff69b4;

            color: white;

            font-size: 18px;

            cursor: pointer;

            transition: .3s;

        }

        button:hover {

            transform: scale(1.05);

        }

        #message {

            display: none;

        }
    </style>
</head>

<body>


    <div class="container">

        <div id="hud">

            <div>❤️ <span id="lives">3</span></div>

            <div>⭐ <span id="score">0</span></div>

            <div>Nivel <span id="level">1</span></div>

            <div class="progress-container">
                <div id="progress"></div>
            </div>

        </div>



        <div id="game">

            <!-- Pantalla inicial -->

            <div class="screen" id="intro">

                <h1>Atrapa el Corazón ❤️</h1>

                <p>

                    ❤️ Atrapa los corazones para ganar puntos.<br><br>

                    💔 Evita los corazones rotos porque perderás vidas.<br><br>

                    ⌨️ Usa las flechas ← → para moverte.<br><br>

                    💕 Supera los 3 niveles para ganar.

                </p>

                <button onclick="startGame()">

                    Comenzar

                </button>

            </div>


            <div class="screen" id="message"></div>


            <div id="player">

                👧

            </div>


        </div>

    </div>



    <script>

        const game = document.getElementById("game");

        const player = document.getElementById("player");

        const intro = document.getElementById("intro");

        const message = document.getElementById("message");

        const scoreTxt = document.getElementById("score");

        const livesTxt = document.getElementById("lives");

        const levelTxt = document.getElementById("level");

        const progress = document.getElementById("progress");


        let lives = 3;

        let score = 0;

        let level = 1;

        let goal = 10;

        let spawn;

        let started = false;

        let playerX = 190;

        const keys = {};



        function startGame() {

            intro.style.display = "none";

            started = true;

            spawn = setInterval(createItem, 700);

        }



        document.addEventListener("keydown", (e) => {

            keys[e.key] = true;

        });



        document.addEventListener("keyup", (e) => {

            keys[e.key] = false;

        });



        function movePlayer() {


            if (keys["ArrowLeft"]) {

                playerX -= 8;

            }


            if (keys["ArrowRight"]) {

                playerX += 8;

            }


            playerX = Math.max(0, Math.min(390, playerX));


            player.style.left = playerX + "px";


            requestAnimationFrame(movePlayer);

        }


        movePlayer();





        function createItem() {


            if (!started) return;


            const item = document.createElement("div");

            item.className = "item";


            const good = Math.random() > 0.25;


            item.innerHTML = good ? "❤️" : "💔";


            item.dataset.good = good;


            item.style.left = Math.random() * 400 + "px";

            item.style.top = "-50px";


            game.appendChild(item);


            let speed = 3 + level;



            const fall = setInterval(() => {


                let y = parseInt(item.style.top);

                y += speed;

                item.style.top = y + "px";



                let px = player.offsetLeft;

                let py = player.offsetTop;


                let ix = item.offsetLeft;

                let iy = item.offsetTop;



                if (

                    ix < px + 50 &&

                    ix + 30 > px &&

                    iy < py + 50 &&

                    iy + 30 > py

                ) {



                    if (item.dataset.good == "true") {


                        score++;

                        scoreTxt.innerText = score;


                        updateProgress();


                    } else {


                        lives--;


                        livesTxt.innerText = lives;


                        if (lives <= 0) {


                            endGame("💔 Perdiste");


                        }


                    }



                    item.remove();

                    clearInterval(fall);


                }



                if (y > 600) {

                    item.remove();

                    clearInterval(fall);

                }


            }, 20);


        }




        function updateProgress() {


            let p = (score / goal) * 100;


            progress.style.width = p + "%";



            if (score >= goal) {


                level++;



                if (level == 2) {

                    goal = 30;

                    score = 0;

                    progress.style.width = "0%";

                    scoreTxt.innerText = 0;

                    levelTxt.innerText = 2;

                }



                else if (level == 3) {

                    goal = 50;

                    score = 0;

                    progress.style.width = "0%";

                    scoreTxt.innerText = 0;

                    levelTxt.innerText = 3;

                }



                else {


                    endGame("💕 ¡Ganaste!");


                }



            }


        }




        function endGame(text) {


            started = false;


            clearInterval(spawn);



            message.style.display = "flex";


            message.innerHTML = `

<h1>${text}</h1>

<button onclick="location.reload()">

Jugar otra vez

</button>

`;


        }



    </script>

</body>

</html>

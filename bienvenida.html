<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenida</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #ffe7f2, #ffd1e8);
            color: #4a1d3c;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #ff9bc7;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.18);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 16px;
            text-align: center;
            color: #b21f4a;
        }
        p {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 24px;
            text-align: center;
        }
        .games {
            display: grid;
            gap: 12px;
        }
        .game-link {
            display: block;
            padding: 14px 18px;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff9bb3, #ff6ea8);
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .game-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(255, 105, 180, 0.28);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bienvenida</h1>
        <p>ALGUNOS JUEGOS PUEDEN ESTAR MAL, SI GANAS MANDAME CAPTURA DE QUE GANASTE, 
            MANDAMELOS TODOS JUNTOS NO POR SEPRADO</p>
            <p>si algun juego esta malito dime</p>
            <p>te los hice con muncho amor 💖</p>
            
        <div class="games">
            <a class="game-link" href="cupido.html">Cupido</a>
            <a class="game-link" href="rompecabezas.html">Rompecabezas</a>
            <a class="game-link" href="puzlee.html">Puzlee</a>
            <a class="game-link" href="busqueda.html">Busqueda</a>
            <a class="game-link" href="zon.html">Atrpadas</a>
        </div>
    </div>
</body>
</html>

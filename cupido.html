<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cupido PRO 💘</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#fff0f5,#ffc1e3,#ff9acd);
}

#game{
width:500px;
height:600px;
background:#fff5fa;
border:4px solid #ff69b4;
border-radius:25px;
position:relative;
overflow:hidden;
}

#hud{
display:flex;
justify-content:space-between;
padding:10px;
color:#c2185b;
font-weight:bold;
}

#barContainer{
width:220px;
height:14px;
background:#ffd6e8;
border-radius:20px;
overflow:hidden;
}

#bar{
height:100%;
width:0%;
background:#ff4f8b;
transition:.2s;
}

#cupido{
position:absolute;
bottom:10px;
left:230px;
font-size:40px;
}

.heart{
position:absolute;
font-size:30px;
}

.arrow{
position:absolute;
font-size:20px;
}

.screen{
position:absolute;
width:100%;
height:100%;
background:rgba(255,245,250,.95);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:10;
padding:20px;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff69b4;
color:white;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="game">

<!-- INTRO -->
<div class="screen" id="intro">
<h1>💘 Cupido PRO</h1>

<p style="line-height:1.6;margin-top:10px">
👼 Mueve con ← →<br>
💘 Dispara con W<br>
❤️ Acierta corazones<br>
📊 Completa la barra de progreso<br>
🔥 3 niveles
</p>

<button onclick="startGame()">JUGAR</button>
</div>

<!-- HUD -->
<div id="hud">
<div>⭐ Puntos: <span id="score">0</span></div>
<div>Nivel: <span id="level">1</span></div>
</div>

<div id="barContainer">
<div id="bar"></div>
</div>

<div id="cupido">👼</div>

</div>

<script>

const game=document.getElementById("game");
const cupido=document.getElementById("cupido");

let x=230;
let keys={};

let score=0;
let level=1;
let target=10;
let speed=1200;

/* CONTROLES */
document.addEventListener("keydown",(e)=>{

keys[e.key]=true;

if(e.key==="w" || e.key==="W"){
shoot();
}

});

document.addEventListener("keyup",(e)=>{
keys[e.key]=false;
});

/* INICIO */
function startGame(){
document.getElementById("intro").style.display="none";
gameLoop();
spawnHearts();
}

/* MOVIMIENTO */
function gameLoop(){

if(keys["ArrowLeft"]) x-=8;
if(keys["ArrowRight"]) x+=8;

x=Math.max(0,Math.min(460,x));
cupido.style.left=x+"px";

requestAnimationFrame(gameLoop);
}

/* DISPARO */
function shoot(){

let arrow=document.createElement("div");
arrow.classList.add("arrow");
arrow.innerHTML="💘";

arrow.style.left=x+"px";
arrow.style.bottom="60px";

game.appendChild(arrow);

let move=setInterval(()=>{

let y=parseInt(arrow.style.bottom);
y+=10;
arrow.style.bottom=y+"px";

if(y>600){
arrow.remove();
clearInterval(move);
}

checkHit(arrow,move);

},20);

}

/* CORAZONES (SE VAN, NO CASTIGO) */
function spawnHearts(){

setInterval(()=>{

let heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*460+"px";
heart.style.top="-40px";

game.appendChild(heart);

let fall=setInterval(()=>{

let y=parseInt(heart.style.top);
y+=3+level*2;
heart.style.top=y+"px";

if(y>600){
heart.remove();
clearInterval(fall);
}

heart.dataset.hit="false";

},20);

},speed);

}

/* COLISIÓN = SOLO PUNTOS */
function checkHit(arrow,move){

let hearts=document.querySelectorAll(".heart");

hearts.forEach(h=>{

if(h.dataset.hit==="true") return;

let hx=h.offsetLeft;
let hy=h.offsetTop;

let ax=arrow.offsetLeft;
let ay=parseInt(arrow.style.bottom);

if(Math.abs(hx-ax)<25 && Math.abs(hy-(600-ay))<30){

h.dataset.hit="true";

h.remove();
arrow.remove();
clearInterval(move);

score++;
update();

}

});

}

/* PROGRESO */
function update(){

document.getElementById("score").innerText=score;

let percent=(score/target)*100;
document.getElementById("bar").style.width=percent+"%";

if(score>=target){
nextLevel();
}

}

/* NIVELES */
function nextLevel(){

level++;
score=0;
target+=10;

if(level==2) speed=900;
if(level==3) speed=700;

document.getElementById("level").innerText=level;
document.getElementById("bar").style.width="0%";

if(level>3){
alert("💕 ¡Ganaste el amor!");
location.reload();
}

}

</script>

</body>
</html>
